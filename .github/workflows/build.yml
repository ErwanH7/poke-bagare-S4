name: Java CI

on: push

jobs:
  build:
    name: Integration Continue = tests + build + generation rapports AUTO
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 18
        uses: actions/setup-java@v5
        with:
          java-version: '18'
          distribution: 'corretto'
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build & test and compute JaCoCo reports
        run: ./gradlew build
      - name: Test Reporter
        uses: dorny/test-reporter@v1.9.1
        if: always()
        with:
          name: Tests JUnit
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit
      - name: JaCoCo Reporter
        id: jacoco_reporter
        uses: PavanMudigonda/jacoco-reporter@v5.1
        if: always()
        with:
          coverage_results_path: build/reports/jacoco/test/jacocoTestReport.xml
          coverage_report_name: Couverture du code JaCoCo
          coverage_report_title: JaCoCo
          github_token: ${{ secrets.GITHUB_TOKEN }}
          skip_check_run: false
          minimum_coverage: 10
          fail_below_threshold: false
          publish_only_summary: false

      - name: Afficher le résumé de couverture
        if: always()
        run: |
          echo "| Résultat | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Couverture % | ${{ steps.jacoco_reporter.outputs.coverage_percentage }} |" >> $GITHUB_STEP_SUMMARY
          echo "| :heavy_check_mark: Lignes couvertes | ${{ steps.jacoco_reporter.outputs.covered_lines }} |" >> $GITHUB_STEP_SUMMARY
          echo "| :x: Lignes manquées | ${{ steps.jacoco_reporter.outputs.missed_lines }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total lignes | ${{ steps.jacoco_reporter.outputs.total_lines }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-coverage-report-markdown
          path: '**/coverage-results.md'
          retention-days: 1