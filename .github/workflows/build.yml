name: Java CI

on: push

jobs:
  build:
    name: Integration Continue = tests + build + generation rapports AUTO
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 18
        uses: actions/setup-java@v6
        with:
          java-version: '18'
          distribution: 'corretto'
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build & test and compute JaCoCo reports
        run: ./gradlew build
      - name: Test Reporter
        uses: dorny/test-reporter@v1.9.1
        if: always()
        with:
          name: Tests JUnit
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit
      - name: JaCoCo Reporter
        uses: PavanMudigonda/jacoco-reporter@v5.0
        if: always()
        with:
          coverage_results_path: build/reports/jacoco/test/jacocoTestReport.xml
          coverage_report_name: Couverture du code JaCoCo
          coverage_report_title: JaCoCo
          github_token: ${{ secrets.GITHUB_TOKEN }}
          minimum_coverage: 80